name: Build and Deploy

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: minicon-eg/minicon-hub

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
          clean: true

      - name: Clean stale files
        run: |
          rm -rf temp-clean-waldhuette website-briefs/temp-clean-waldhuette 2>/dev/null || true
          rm -f .gitmodules 2>/dev/null || true
          rm -rf .git/modules 2>/dev/null || true

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: ./Dockerfile
          push: true
          tags: ${{ env.REGISTRY}}/${{ env.IMAGE_NAME }}:latest
          pull: true

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /root/minicon-hub
            docker-compose pull || true
            docker-compose up -d || docker-compose -f docker-compose.yml up -d
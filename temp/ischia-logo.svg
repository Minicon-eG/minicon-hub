<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <!-- Island of Ischia - Woodcut/Ink style illustration -->
  
  <!-- Coastline hatching (outer fringe) -->
  <g stroke="#1a1a1a" stroke-width="0.8" opacity="0.6">

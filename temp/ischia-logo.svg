    <line x1="60" y1="45" x2="55" y2="30"/><line x1="75" y1="40" x2="72" y2="25"/>
    <line x1="90" y1="38" x2="88" y2="23"/><line x1="105" y1="42" x2="103" y2="27"/>
    <line x1="120" y1="45" x2="118" y2="30"/><line x1="135" y1="43" x2="133" y2="28"/>
    <line x1="150" y1="40" x2="148" y2="25"/><line x1="165" y1="42" x2="163" y2="27"/>
    <line x1="180" y1="45" x2="178" y2="30"/><line x1="195" y1="43" x2="193" y2="28"/>
    <line x1="210" y1="40" x2="208" y2="25"/><line x1="225" y1="42" x2="224" y2="27"/>
    <line x1="240" y1="45" x2="239" y2="30"/><line x1="255" y1="48" x2="254" y2="33"/>
    <line x1="270" y1="50" x2="269" y2="35"/><line x1="285" y1="48" x2="284" y2="33"/>
    <line x1="300" y1="52" x2="300" y2="37"/><line x1="315" y1="55" x2="316" y2="40"/>
    <!-- East coast hatching -->
    <line x1="340" y1="70" x2="355" y2="65"/><line x1="345" y1="85" x2="360" y2="82"/>
    <line x1="348" y1="100" x2="363" y2="98"/><line x1="350" y1="115" x2="365" y2="114"/>
    <line x1="348" y1="130" x2="363" y2="130"/><line x1="345" y1="145" x2="360" y2="146"/>
    <line x1="340" y1="160" x2="355" y2="162"/><line x1="335" y1="175" x2="350" y2="178"/>
    <!-- South coast hatching -->
    <line x1="320" y1="195" x2="325" y2="210"/><line x1="305" y1="200" x2="308" y2="215"/>
    <line x1="290" y1="205" x2="292" y2="220"/><line x1="270" y1="210" x2="271" y2="225"/>
    <line x1="250" y1="215" x2="250" y2="230"/><line x1="230" y1="220" x2="229" y2="235"/>
    <line x1="210" y1="218" x2="208" y2="233"/><line x1="190" y1="225" x2="187" y2="240"/>
    <line x1="170" y1="230" x2="166" y2="245"/><line x1="150" y1="225" x2="146" y2="240"/>
    <line x1="130" y1="220" x2="125" y2="235"/><line x1="110" y1="215" x2="105" y2="230"/>
    <line x1="90" y1="218" x2="84" y2="233"/><line x1="70" y1="210" x2="63" y2="225"/>
    <!-- West coast hatching -->
    <line x1="50" y1="195" x2="35" y2="198"/><line x1="45" y1="180" x2="30" y2="182"/>
    <line x1="40" y1="165" x2="25" y2="166"/><line x1="38" y1="150" x2="23" y2="150"/>
    <line x1="35" y1="135" x2="20" y2="134"/><line x1="33" y1="120" x2="18" y2="118"/>
    <line x1="35" y1="105" x2="20" y2="102"/><line x1="38" y1="90" x2="23" y2="86"/>
    <line x1="42" y1="75" x2="27" y2="70"/><line x1="48" y1="60" x2="33" y2="54"/>
  </g>
  
  <!-- Main island outline -->
  <path d="M55 50 
    C60 42, 70 38, 85 40 
    C100 38, 115 42, 130 45 
    C145 40, 155 38, 170 42 
    C190 40, 210 38, 230 42
    C250 45, 270 48, 290 50
    C305 52, 320 55, 335 65
    C345 72, 350 85, 352 100
    C354 115, 352 130, 348 145
    C344 160, 340 170, 332 185
    C325 195, 315 200, 300 205
    C285 210, 275 208, 260 212
    C245 218, 235 222, 220 220
    C205 225, 195 228, 180 232
    C165 228, 150 222, 135 218
    C120 215, 105 212, 90 215
    C75 210, 60 205, 52 195
    C45 185, 40 170, 38 155
    C35 140, 34 125, 36 110
    C38 95, 42 80, 48 65
    C50 58, 52 52, 55 50Z" 
    fill="white" stroke="#1a1a1a" stroke-width="2.5" stroke-linejoin="round"/>
  
  <!-- Mountain symbols (center-north) -->
  <g stroke="#1a1a1a" stroke-width="1.5" fill="none">
    <!-- Mountain 1 -->
    <path d="M140 85 L155 60 L170 85"/>
    <line x1="155" y1="60" x2="162" y2="72" stroke-width="0.8"/>
    <line x1="158" y1="68" x2="165" y2="78" stroke-width="0.8"/>
    <!-- Mountain 2 -->
    <path d="M170 88 L185 62 L200 88"/>
    <line x1="185" y1="62" x2="192" y2="74" stroke-width="0.8"/>
    <line x1="188" y1="70" x2="195" y2="80" stroke-width="0.8"/>
    <!-- Mountain 3 (smaller) -->
    <path d="M115 92 L128 72 L141 92"/>
    <line x1="128" y1="72" x2="134" y2="82" stroke-width="0.8"/>
    <!-- Mountain 4 (background) -->
    <path d="M195 90 L208 70 L221 90"/>
    <line x1="208" y1="70" x2="214" y2="80" stroke-width="0.8"/>
  </g>
  
  <!-- Small buildings (northwest settlement) -->
  <g fill="#1a1a1a">
    <rect x="80" y="95" width="6" height="8" rx="0.5"/>
    <rect x="90" y="93" width="5" height="9" rx="0.5"/>
    <rect x="98" y="96" width="7" height="7" rx="0.5"/>
    <!-- Church/tower -->
    <rect x="85" y="88" width="4" height="15" rx="0.3"/>
    <polygon points="87,85 83,92 91,92"/>
  </g>
  
  <!-- Scattered buildings (center-east) -->
  <g fill="#1a1a1a">
    <rect x="250" y="100" width="5" height="6" rx="0.5"/>
    <rect x="258" y="102" width="4" height="5" rx="0.5"/>
    <rect x="245" y="105" width="6" height="5" rx="0.5"/>
  </g>
  
  <!-- Vegetation dots (stippling) -->
  <g fill="#1a1a1a" opacity="0.5">
    <circle cx="160" cy="120" r="1"/><circle cx="175" cy="125" r="1"/>
    <circle cx="190" cy="118" r="1"/><circle cx="205" cy="130" r="1"/>
    <circle cx="145" cy="130" r="1"/><circle cx="220" cy="120" r="1"/>
    <circle cx="130" cy="140" r="1.2"/><circle cx="200" cy="145" r="1"/>
    <circle cx="170" cy="150" r="1"/><circle cx="240" cy="135" r="1"/>
    <circle cx="110" cy="150" r="1"/><circle cx="280" cy="130" r="1"/>
    <circle cx="155" cy="165" r="1"/><circle cx="185" cy="170" r="1"/>
    <circle cx="215" cy="160" r="1.2"/><circle cx="260" cy="155" r="1"/>
    <circle cx="120" cy="170" r="1"/><circle cx="295" cy="150" r="1"/>
    <!-- Tree-like marks -->
    <circle cx="230" cy="150" r="2"/><circle cx="230" cy="148" r="1.5"/>
    <circle cx="150" cy="180" r="2"/><circle cx="150" cy="178" r="1.5"/>
    <circle cx="270" cy="165" r="2"/><circle cx="270" cy="163" r="1.5"/>
  </g>
  
  <!-- Interior terrain hatching (south lowlands) -->
  <g stroke="#1a1a1a" stroke-width="0.5" opacity="0.3">
    <line x1="100" y1="185" x2="115" y2="188"/><line x1="120" y1="190" x2="135" y2="192"/>
    <line x1="140" y1="195" x2="155" y2="197"/><line x1="160" y1="200" x2="175" y2="202"/>
    <line x1="200" y1="195" x2="215" y2="198"/><line x1="230" y1="190" x2="245" y2="193"/>
    <line x1="260" y1="185" x2="275" y2="188"/><line x1="290" y1="180" x2="305" y2="183"/>
  </g>
  
  <!-- South coast detail bays -->
  <g stroke="#1a1a1a" stroke-width="0.6" opacity="0.4">
    <line x1="180" y1="232" x2="175" y2="242"/><line x1="185" y1="230" x2="182" y2="240"/>
    <line x1="135" y1="218" x2="130" y2="228"/><line x1="260" y1="212" x2="258" y2="222"/>
  </g>
</svg>
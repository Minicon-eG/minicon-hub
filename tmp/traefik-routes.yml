# =============================================================================
# Traefik Routes Configuration - minicon-web (91.98.30.140)
# =============================================================================
# Versioniert in: C:\working\atlas\infra\minicon-web\traefik\
# Deploy mit: scripts\sync-traefik.ps1
# =============================================================================

http:
  # =========================================================================
  # MIDDLEWARES
  # =========================================================================
  middlewares:
    redirect-to-https:
      redirectScheme:
        scheme: https
        permanent: true
    
    cors-api:
      headers:
        accessControlAllowMethods: [GET, POST, PUT, DELETE, OPTIONS]
        accessControlAllowHeaders: [Content-Type, Authorization, X-API-Key]
        accessControlAllowOriginList:
          - https://dokukiste.de
          - https://www.dokukiste.de
          - https://app.dokukiste.de
        accessControlMaxAge: 86400
        addVaryHeader: true

    cors-website-service:
      headers:
        accessControlAllowMethods: [GET, POST, PATCH, PUT, DELETE, OPTIONS]
        accessControlAllowHeaders: [Content-Type, Authorization, X-API-Key, Stripe-Signature]
        accessControlAllowOriginList:
          - https://minicon.eu
          - https://www.minicon.eu
          - https://mein.minicon.eu
          - https://preview-mein.minicon.eu
          - https://admin.minicon.eu
          - https://preview-www.minicon.eu
          - https://assistant.minicon.eu
        accessControlMaxAge: 86400
        addVaryHeader: true

    # Basic Auth f├ö├Â┬ú├ö├▓├ÿr app.dokukiste.de
    # User: admin, Password: dokukiste
    basic-auth-app:
      basicauth:
        users:
          - "admin:$2y$10$5sFBHwRadJ9vNn467wmXY.NW1esDNVmHHDGBuyABD/qqgrUMDKmfu"

  # =========================================================================
  # ROUTERS
  # =========================================================================

    assistant-redirect:
      redirectRegex:
        regex: "^https://assistant\\.minicon\\.eu/$"
        replacement: "https://assistant.minicon.eu/assistent/"
        permanent: true

  routers:
    # Assistant API
    assistent-api:
      rule: "Host(`assistent-api.minicon.eu`)"
      service: assistant-service
      entryPoints: [websecure]
      tls:
        certResolver: cloudflare
      middlewares: [cors-api]

    preview-assistent-api:
      rule: "Host(`preview-assistent-api.minicon.eu`)"
      service: preview-assistant-service
      entryPoints: [websecure]
      tls:
        certResolver: cloudflare
      middlewares: [cors-api]
    # PREVIEW - KUNDENPORTAL
    preview-kundenportal:
      rule: "Host(`preview-mein.minicon.eu`)"
      service: preview-kundenportal
      entryPoints: [websecure]
      priority: 200
      tls:
        certResolver: cloudflare

    # PREVIEW - WEBSITE SERVICE
    preview-website-service:
      rule: "Host(`preview-api.minicon.eu`)"
      service: preview-website-service
      entryPoints: [websecure]
      priority: 200
      middlewares: [cors-website-service]
      tls:
        certResolver: cloudflare


    # RUNNER STATUS (intern fuer Kuma)
    runner-status:
      rule: "Host(`runner-status.minicon.eu`)"
      service: runner-status
      entryPoints: [websecure]
      tls:
        certResolver: cloudflare

    # -------------------------------------------------------------------------
    # PREVIEW WILDCARD
    # -------------------------------------------------------------------------
    preview:
      rule: "HostRegexp(`^preview-.+[.]minicon[.]eu$`)"
      priority: 1
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
        domains:
          - main: "*.minicon.eu"
      service: preview
    # -------------------------------------------------------------------------
    # DOKUKISTE
    # -------------------------------------------------------------------------
    dokukiste:
      rule: "Host(`dokukiste.de`) || Host(`www.dokukiste.de`)"
      service: dokukiste
      entryPoints: [websecure]
      tls:
        certResolver: cloudflare

    control-api:
      rule: "Host(`api.dokukiste.de`)"
      service: control-api
      entryPoints: [websecure]
      tls:
        certResolver: cloudflare
      middlewares: [cors-api]

    # -------------------------------------------------------------------------
    # KUNDENPORTAL
    # -------------------------------------------------------------------------
    kundenportal:
      rule: "Host(`mein.minicon.eu`)"
      service: kundenportal
      entryPoints: [websecure]
      tls:
        certResolver: cloudflare

    # -------------------------------------------------------------------------
    # WEBSITE SERVICE API
    # -------------------------------------------------------------------------
    website-service:
      rule: "Host(`api.minicon.eu`)"
      service: website-service
      entryPoints: [websecure]
      tls:
        certResolver: cloudflare
      middlewares: [cors-website-service]

    # -------------------------------------------------------------------------
    # ADMIN DASHBOARD
    # -------------------------------------------------------------------------
    admin-dashboard:
      rule: "Host(`admin.minicon.eu`)"
      service: kundenportal
      entryPoints: [websecure]
      tls:
        certResolver: cloudflare


    control-plane-web:
      rule: "Host(`app.dokukiste.de`)"
      service: control-plane-web
      entryPoints: [websecure]
      tls:
        certResolver: cloudflare
      middlewares: [basic-auth-app]

    # -------------------------------------------------------------------------
    # MINICON
    # -------------------------------------------------------------------------
    minicon-eu:
      rule: "Host(`minicon.eu`) || Host(`www.minicon.eu`)"
      service: minicon
      entryPoints: [websecure]
      tls:
        certResolver: cloudflare


    assistant:
      rule: "Host(`assistant.minicon.eu`)"
      service: minicon
      entryPoints: [websecure]
      tls:
        certResolver: cloudflare
      middlewares: [assistant-redirect]

    # Minicon eG Domains (NS auf Cloudflare umgestellt 17.02.2026)
    minicon-eg:
      rule: "Host(`minicon-eg.de`) || Host(`www.minicon-eg.de`) || Host(`minicon-genossenschaft.de`) || Host(`www.minicon-genossenschaft.de`)"
      service: minicon
      entryPoints: [websecure]
      tls:
        certResolver: cloudflare

    # -------------------------------------------------------------------------
    # DORFKISTE (Frontend + API)
    # -------------------------------------------------------------------------
    dorfkiste-frontend:
      rule: "Host(`dorfkiste.com`) || Host(`www.dorfkiste.com`) || Host(`dorfkiste.org`) || Host(`www.dorfkiste.org`)"
      service: dorfkiste-frontend
      entryPoints: [websecure]
      tls:
        certResolver: cloudflare

    dorfkiste-api:
      rule: "(Host(`dorfkiste.com`) || Host(`www.dorfkiste.com`) || Host(`dorfkiste.org`) || Host(`www.dorfkiste.org`)) && PathPrefix(`/api`)"
      service: dorfkiste-backend
      entryPoints: [websecure]
      tls:
        certResolver: cloudflare
      priority: 100

    # -------------------------------------------------------------------------
    # KRANKENHAUS
    # -------------------------------------------------------------------------
    krankenhaus:
      rule: "Host(`krankenhaus.minicon.eu`)"
      service: krankenhaus
      entryPoints: [websecure]
      tls:
        certResolver: cloudflare

    # -------------------------------------------------------------------------
    # ANDERE SUBDOMAINS
    # -------------------------------------------------------------------------
    datagen:
      rule: "Host(`datagen.minicon.eu`)"
      service: datagen
      entryPoints: [websecure]
      tls:
        certResolver: cloudflare

    gem:
      rule: "Host(`gem.minicon.eu`)"
      service: gem
      entryPoints: [websecure]
      tls:
        certResolver: cloudflare

    schdubb:
      rule: "Host(`schdubb.minicon.eu`)"
      service: schdubb
      entryPoints: [websecure]
      tls:
        certResolver: cloudflare


        # Mail API Worker (proxy to Cloudflare Worker)
    # -------------------------------------------------------------------------
    # MINICON HUB
    # -------------------------------------------------------------------------
    minicon-hub:
      rule: "Host(`hub.minicon.eu`)"
      service: minicon-hub
      entryPoints: [websecure]
      tls:
        certResolver: cloudflare

    mail-api:
      rule: "Host(`mail-api.minicon.eu`)"
      service: mail-api-worker
      entryPoints: [websecure]
      tls:
        certResolver: cloudflare
  # =========================================================================
  # SERVICES
  # =========================================================================
  services:
    # Assistant Service
    assistant-service:
      loadBalancer:
        servers:
          - url: "http://assistant-service:3000"

    preview-assistant-service:
      loadBalancer:
        servers:
          - url: "http://preview-assistant-service:3000"
    # Dokukiste
    dokukiste:
      loadBalancer:
        servers:
          - url: "http://dokukiste:80"

    control-api:
      loadBalancer:
        servers:
          - url: "http://control-plane-api:5000"

    control-plane-web:
      loadBalancer:
        servers:
          - url: "http://control-plane-web:3001"

    # Minicon
    minicon:
      loadBalancer:
        servers:
          - url: "http://minicon:80"

    # Dorfkiste
    dorfkiste-frontend:
      loadBalancer:
        servers:
          - url: "http://dorfkiste-frontend:3000"

    dorfkiste-backend:
      loadBalancer:
        servers:
          - url: "http://dorfkiste-backend:8080"

    # Krankenhaus
    krankenhaus:
      loadBalancer:
        servers:
          - url: "http://krankenhaus:3000"

    # Andere
    kundenportal:
      loadBalancer:
        servers:
          - url: "http://kundenportal:3000"

    website-service:
      loadBalancer:
        servers:
          - url: "http://website-service:4000"

    datagen:
      loadBalancer:
        servers:
          - url: "http://172.17.0.1:3002"

    gem:
      loadBalancer:
        servers:
          - url: "http://gem:80"

    schdubb:
      loadBalancer:
        servers:
          - url: "http://schdubb:80"

    preview-kundenportal:
      loadBalancer:
        servers:
          - url: "http://preview-kundenportal:3000"

    preview-website-service:
      loadBalancer:
        servers:
          - url: "http://preview-website-service:4000"

    runner-status:
      loadBalancer:
        servers:
          - url: "http://runner-status:3099"

    preview:
      loadBalancer:
        servers:
          - url: "http://preview-nginx:80"


    # Mail API -> Cloudflare Worker (Fallback fuer nicht-proxied DNS)
    mail-api-worker:
      loadBalancer:
        servers:
          - url: "https://tv-dahn-mail-worker.minicon.workers.dev"
        passHostHeader: false


    minicon-hub:
      loadBalancer:
        servers:
          - url: "http://minicon-hub:3000"
